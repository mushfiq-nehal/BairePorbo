  <defs id="defs1">
    <style type="text/css"><![CDATA[
      .trail {
        transform-box: fill-box;
        transform-origin: center;
        animation: trailPulse 3.2s ease-in-out infinite;
      }
      .plane {
        transform-box: fill-box;
        transform-origin: center;
        animation: planeCruise 5.5s ease-in-out infinite;
      }
      .pin {
        transform-box: fill-box;
        transform-origin: 50% 100%;
        animation: pinBob 2.8s ease-in-out infinite;
      }

      @keyframes planeCruise {
        0%   { transform: translate(0, 0) rotate(0deg); }
        30%  { transform: translate(7px, -9px) rotate(-3deg); }
        60%  { transform: translate(11px, -3px) rotate(2deg); }
        100% { transform: translate(0, 0) rotate(0deg); }
      }

      @keyframes pinBob {
        0%, 100% { transform: translateY(0) scale(1); }
        50%      { transform: translateY(-6px) scale(1.04); }
      }

      @keyframes trailPulse {
        0%, 100% { opacity: 0.5; }
        50%      { opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        .trail, .plane, .pin { animation: none; }
      }
    ]]></style>
  </defs>
