<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BairePorbo — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 32px 24px;
      background: #f3efe7;
      font-family: "Segoe UI", sans-serif;
      text-align: center;
      color: #1b1b1b;
    }
    img { width: 64px; height: 64px; border-radius: 16px; }
    h1 { font-size: 1.5rem; font-weight: 700; }
    p { font-size: 15px; color: #5e5e5e; max-width: 320px; line-height: 1.55; }
    a {
      display: inline-block;
      margin-top: 8px;
      padding: 12px 24px;
      background: #0f8f8d;
      color: #fff;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <img src="/logo.png" alt="BairePorbo" />
  <h1>You're offline</h1>
  <p>
    Check your internet connection and try again. Your bookmarks and profile
    are saved and will sync when you're back online.
  </p>
  <a href="/">Try again</a>
</body>
</html>
