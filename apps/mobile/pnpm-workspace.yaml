# Marks apps/mobile as its own standalone pnpm root (mirroring apps/web), so
# installs here stay isolated from the repo root and the web app.

# Expo/Metro expects a flat, npm-style node_modules. pnpm's default isolated
# layout hides transitive deps that Metro resolves directly (e.g. NativeWind's
# react-native-css-interop). Hoisting avoids that class of bundling failures.
# (pnpm v11 reads this from pnpm-workspace.yaml, not .npmrc.)
nodeLinker: hoisted

allowBuilds:
  # Native/optional build scripts not needed for Metro bundling — declined so
  # pnpm doesn't treat them as undecided (which returns a non-zero exit).
  '@clerk/shared': false
  browser-tabs-lock: false
  bufferutil: false
  core-js: false
  utf-8-validate: false
  esbuild: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@expo/cli@57.0.9'
  - '@expo/metro-config@57.0.6'
  - '@expo/metro-runtime@57.0.6'
  - '@expo/prebuild-config@57.0.8'
  - '@expo/ui@57.0.7'
  - expo-asset@57.0.6
  - expo-constants@57.0.6
  - expo-modules-autolinking@57.0.8
  - expo-modules-core@57.0.6
  - expo-router@57.0.7
  - expo@57.0.7
  - expo-application@57.0.2
  - expo-auth-session@57.0.4
